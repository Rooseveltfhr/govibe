name: Deploy TAGTOA to VPS

# Déploiement DÉLIBÉRÉ (risque #2 : ne pas casser la prod par accident) :
# - bouton manuel (workflow_dispatch)
# - ou push sur main touchant le module
on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["Modules/Tagtoa/**"]

concurrency:
  group: deploy-tagtoa
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync module + safe deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${{ secrets.VPS_PORT }}"; PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      # Le VPS a été restructuré (public_html/tapbiz → laravel/ ou public_html).
      # On résout le chemin RÉEL de l'app (présence d'artisan) au lieu de faire
      # aveuglément confiance au secret VPS_APP_PATH — le deploy survit aux
      # déplacements de dossiers.
      - name: Resolve app path on VPS
        id: apppath
        run: |
          PORT="${{ secrets.VPS_PORT }}"; PORT="${PORT:-22}"
          RESOLVED=$(ssh -i ~/.ssh/id_deploy -p "$PORT" -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" '
              # 1) le secret, s il est bon, gagne
              p="${{ secrets.VPS_APP_PATH }}"
              if [ -n "$p" ] && [ -f "$p/artisan" ]; then printf "%s" "$p"; exit 0; fi
              # 2) scan de tous les comptes (l utilisateur SSH n est pas forcément "admin")
              hit=$(find /home/*/domains/tagtoa.com "$HOME/domains/tagtoa.com" \
                      -maxdepth 3 -name artisan -type f 2>/dev/null | head -1)
              if [ -n "$hit" ]; then printf "%s" "$(dirname "$hit")"; exit 0; fi
              # 3) diagnostic vers stderr (visible dans le log, jamais dans $RESOLVED)
              echo "--- diagnostic structure ---" >&2
              ls -d /home/*/domains/*/ 2>/dev/null >&2 || true
              ls "$HOME" 2>/dev/null >&2 || true
              exit 42
            ') || { echo "::error::Aucune app Laravel trouvée (artisan introuvable) — voir le diagnostic ci-dessus."; exit 1; }
          echo "path=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "==> App path résolu."

      - name: Rsync Modules/Tagtoa to VPS
        run: |
          PORT="${{ secrets.VPS_PORT }}"; PORT="${PORT:-22}"
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_deploy -p $PORT -o StrictHostKeyChecking=accept-new" \
            Modules/Tagtoa/ \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ steps.apppath.outputs.path }}/Modules/Tagtoa/"

      - name: Run safe deploy on VPS
        run: |
          PORT="${{ secrets.VPS_PORT }}"; PORT="${PORT:-22}"
          ssh -i ~/.ssh/id_deploy -p "$PORT" -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "bash '${{ steps.apppath.outputs.path }}/Modules/Tagtoa/deploy/remote-deploy.sh' '${{ steps.apppath.outputs.path }}'"
