name: govibe-ai CI

on:
  push:
    branches: [main]
    paths:
      - "govibe-ai/**"
      - ".github/workflows/govibe-ai-ci.yml"
  pull_request:
    paths:
      - "govibe-ai/**"
      - ".github/workflows/govibe-ai-ci.yml"

defaults:
  run:
    working-directory: govibe-ai

jobs:
  ci:
    name: Lint + analyse + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: intl, zip, bcmath, pcntl, pdo_sqlite
          coverage: none

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-govibe-ai-${{ hashFiles('govibe-ai/composer.lock') }}
          restore-keys: composer-govibe-ai-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Code style (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: Prepare app
        run: cp .env.example .env && php artisan key:generate

      - name: Tests (Pest)
        run: vendor/bin/pest --ci
